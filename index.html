<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Mundo Procedural 3D</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "peerjs": "https://esm.sh/peerjs@1.5.4"
        }
      }
    </script>
</head>
<body>

    <div id="crosshair">+</div>
    <div id="fps-counter">-- FPS</div>

    <div id="menu">
        <h1>Meu Mundo Procedural</h1>
        <div id="seed-controls" data-menu-control>
            <div class="seed-label">Seed: <span id="seed-value">...</span></div>
            <div class="seed-actions">
                <button id="copy-seed" type="button">Copiar seed</button>
                <button id="new-world" type="button">Novo mundo</button>
            </div>
        </div>
        <div id="mode-controls" data-menu-control>
            <button id="single-mode" type="button">Single player</button>
            <button id="coop-mode" type="button">Coop local</button>
        </div>
        <div id="online-controls" data-menu-control>
            <input id="online-name" type="text" placeholder="Seu nome" maxlength="16" autocomplete="off" />
            <div class="online-buttons">
                <button id="online-host" type="button">Abrir sala online</button>
                <button id="online-join-toggle" type="button">Entrar em sala</button>
            </div>
            <div id="online-join-panel">
                <input id="online-join-code" type="text" placeholder="Codigo da sala" maxlength="6" autocomplete="off" />
                <button id="online-join-confirm" type="button">Entrar</button>
            </div>
            <div id="online-join-status"></div>
        </div>
        <p>Clique na tela para jogar</p>
        <p style="font-size: 0.8rem; margin-top: 20px;">(Pressione ESC para soltar o mouse)</p>
    </div>

    <div id="loading-screen" aria-live="polite" aria-hidden="true">
        <div id="loading-title">Carregando mundo</div>
        <div id="loading-status">Preparando terreno...</div>
        <div id="loading-bar">
            <div id="loading-bar-fill"></div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
    
</body>
</html>
